[package]
name = "ai4s-workbench"
version = "0.1.0"
description = "AI4S Workbench Desktop"
authors = ["AI4S Workbench contributors"]
edition = "2021"

[lib]
name = "ai4s_workbench_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-single-instance = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
