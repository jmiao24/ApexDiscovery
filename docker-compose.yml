# Self-hosted ApexDiscovery web server.
#   APEX_TOKEN=<browser-token> OPENAI_API_KEY=<key> docker compose up -d
# Open http://localhost:3411 and sign in with the token. For access beyond
# localhost, terminate TLS in a reverse proxy in front of this service.
services:
  apexdiscovery:
    build: .
    ports:
      - "3411:3411"
    environment:
      # Pin the login token; without it a fresh one is generated per start
      # (printed in the container log).
      APEX_TOKEN: ${APEX_TOKEN:-}
      # Passed only to the local Codex bridge; it is not embedded in the image
      # or sent to the browser.
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY}
    volumes:
      # Workspaces, sessions, provenance, runtime config — everything durable.
      - apex-data:/data
    restart: unless-stopped

volumes:
  apex-data:
