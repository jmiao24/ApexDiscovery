name: build

# Builds self-contained browser bundles plus legacy desktop installers for
# macOS, Windows, and Linux. On a `v*` tag push, artifacts are attached to a
# draft GitHub Release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# tauri-action needs to create the draft release and upload assets.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            target: aarch64-apple-darwin
          - platform: macos-15-intel
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl \
            wget file libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4   # version comes from package.json "packageManager"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare bundled Codex runtime
        shell: bash
        run: node scripts/dev/prepare-codex-runtime.mjs --target ${{ matrix.target }}

      - name: Fetch bundled ai4s-skills pack
        shell: bash
        run: bash scripts/dev/fetch-skills.sh

      - name: Fetch bundled uv sidecar
        shell: bash
        run: bash scripts/dev/fetch-uv.sh ${{ matrix.target }}

      - name: Build the app (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          # Linux: deb+rpm only. AppImage is off because linuxdeploy runs ldd
          # on every bundled executable; keep the supported package formats explicit.
          args: --target ${{ matrix.target }} ${{ startsWith(matrix.platform, 'ubuntu') && '--bundles deb,rpm' || '' }}
          # On a v* tag push, attach installers to a draft GitHub Release.
          # Empty tagName (workflow_dispatch) skips release creation.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('APEX Discovery {0}', github.ref_name) || '' }}
          releaseDraft: true
          # Standing install/first-launch notes — every draft is born with these
          # (the builds are unsigned/un-notarized, so users must clear Gatekeeper /
          # SmartScreen once). Prepend the per-version changelog before publishing.
          releaseBody: |
            ## ⚠️ Install & first launch — unsigned builds

            These installers are **not code-signed or notarized**, so your OS warns on first launch. This is expected; clear it once:

            **macOS** — Apple Silicon: `…_aarch64.dmg` · Intel: `…_x64.dmg` (requires macOS 13+)
            1. Open the DMG and drag **APEX Discovery** into Applications.
            2. If you see *"… is damaged and can't be opened"* or *"unidentified developer"*, clear the quarantine attribute in Terminal, then open normally:
               ```
               xattr -cr "/Applications/APEX Discovery.app"
               ```

            **Windows** — `…_x64-setup.exe` or `…_x64_en-US.msi`
            - SmartScreen shows *"Windows protected your PC"* → **More info** → **Run anyway**.

            **Linux** — `.deb` / `.rpm`
            - `sudo apt install ./…_amd64.deb`  or  `sudo rpm -i …x86_64.rpm`

            > **No in-app auto-update** — download new versions from this Releases page. (The `.app.tar.gz` assets are build artifacts, not an update channel.)

            ---

            <!-- Prepend this release's changelog above this line before publishing. -->

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ai4s-workbench-${{ matrix.target }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          if-no-files-found: warn

  browser-bundle:
    name: Browser bundle (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            platform: macos-15
          - name: macos-x64
            platform: macos-15-intel
          - name: windows-x64
            platform: windows-latest
          - name: linux-x64
            platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache server build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/server

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch bundled skills
        shell: bash
        run: bash scripts/dev/fetch-skills.sh

      - name: Build browser frontend and server
        shell: bash
        run: |
          pnpm --filter @ai4s/desktop build
          cargo build --release --manifest-path apps/server/Cargo.toml
          pnpm --filter @ai4s/codex-bridge deploy --prod .browser-build/codex-bridge

      - name: Assemble self-contained browser release
        shell: bash
        run: |
          server=apps/server/target/release/apexdiscovery-server
          if [ "${{ runner.os }}" = "Windows" ]; then server="$server.exe"; fi
          node scripts/release/package-browser.mjs \
            --server "$server" \
            --bridge .browser-build/codex-bridge \
            --out .browser-release/apexdiscovery-browser

      - name: Archive Unix browser release
        if: runner.os != 'Windows'
        shell: bash
        run: tar -czf apexdiscovery-browser-${{ matrix.name }}.tar.gz -C .browser-release apexdiscovery-browser

      - name: Archive Windows browser release
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path .browser-release/apexdiscovery-browser -DestinationPath apexdiscovery-browser-${{ matrix.name }}.zip

      - name: Upload browser bundle
        uses: actions/upload-artifact@v4
        with:
          name: apexdiscovery-browser-${{ matrix.name }}
          path: apexdiscovery-browser-${{ matrix.name }}.*
          if-no-files-found: error

      - name: Attach browser bundle to tagged release
        if: github.ref_type == 'tag'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --draft \
              --title "APEX Discovery $GITHUB_REF_NAME" \
              --notes "Self-contained browser bundles and legacy desktop installers." \
              || gh release view "$GITHUB_REF_NAME"
          fi
          gh release upload "$GITHUB_REF_NAME" apexdiscovery-browser-${{ matrix.name }}.* --clobber
