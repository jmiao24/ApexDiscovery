name: build

# Builds macOS (.dmg/.app) and Windows (NSIS .exe / .msi) installers.
# Windows installers can only be produced on a Windows runner — hence the matrix.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch bundled OpenCode sidecar
        shell: bash
        run: bash scripts/dev/fetch-opencode.sh ${{ matrix.target }}

      - name: Fetch bundled ai4s-skills pack
        shell: bash
        run: bash scripts/dev/fetch-skills.sh

      - name: Fetch bundled uv sidecar
        shell: bash
        run: bash scripts/dev/fetch-uv.sh ${{ matrix.target }}

      - name: Build the app (Tauri)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ai4s-workbench-${{ matrix.target }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
          if-no-files-found: warn
