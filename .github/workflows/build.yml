name: build

# Builds macOS (.dmg/.app), Windows (NSIS .exe / .msi) and Linux
# (.deb/.rpm/.AppImage) installers. Each platform's installer can only be
# produced on its own runner — hence the matrix. On a `v*` tag push the
# installers are also attached to a draft GitHub Release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# tauri-action needs to create the draft release and upload assets.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl \
            wget file libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4   # version comes from package.json "packageManager"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch bundled OpenCode sidecar
        shell: bash
        run: bash scripts/dev/fetch-opencode.sh ${{ matrix.target }}

      - name: Fetch bundled ai4s-skills pack
        shell: bash
        run: bash scripts/dev/fetch-skills.sh

      - name: Fetch bundled uv sidecar
        shell: bash
        run: bash scripts/dev/fetch-uv.sh ${{ matrix.target }}

      - name: Build the app (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          # Linux: deb+rpm only. AppImage is off because linuxdeploy runs ldd
          # on every bundled ELF and ldd exits 1 on the Bun-built opencode
          # sidecar, aborting the whole bundle (tauri-apps/tauri#8929).
          args: --target ${{ matrix.target }} ${{ startsWith(matrix.platform, 'ubuntu') && '--bundles deb,rpm' || '' }}
          # On a v* tag push, attach installers to a draft GitHub Release.
          # Empty tagName (workflow_dispatch) skips release creation.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Open Science {0}', github.ref_name) || '' }}
          releaseDraft: true

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ai4s-workbench-${{ matrix.target }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          if-no-files-found: warn
